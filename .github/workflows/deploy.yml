name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and build
        run: |
          cd "CLAUDE CODE"
          pip install flask
          python build.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "CLAUDE CODE/_site"

      - uses: actions/deploy-pages@v4
